<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Unicorn Rentals</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
            color: white;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .welcome-title {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #4ecdc4;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        textarea,
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            resize: vertical;
        }

        textarea:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .magic-button {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.4);
        }

        .magic-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(78, 205, 196, 0.6);
        }

        .upload-button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .upload-button:hover {
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.6);
        }

        .search-button {
            background: linear-gradient(45deg, #feca57, #ff9ff3);
            box-shadow: 0 8px 25px rgba(254, 202, 87, 0.4);
        }

        .search-button:hover {
            box-shadow: 0 12px 35px rgba(254, 202, 87, 0.6);
        }

        .notes-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .notes-list li {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 0.5rem;
            padding: 1rem;
            border-radius: 10px;
            border-left: 4px solid #4ecdc4;
        }

        .notes-list a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .notes-list a:hover {
            color: #4ecdc4;
        }

        .admin-link,
        .logout-link {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
            margin: 0.5rem;
        }

        .admin-link:hover,
        .logout-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.6);
        }

        .logout-link {
            background: linear-gradient(45deg, #95a5a6, #7f8c8d);
            box-shadow: 0 8px 25px rgba(149, 165, 166, 0.4);
        }

        .logout-link:hover {
            box-shadow: 0 12px 35px rgba(149, 165, 166, 0.6);
        }

        .actions {
            text-align: center;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .welcome-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1 class="welcome-title">Welcome, <!-- VULNERABILITY: XSS -->
            <span id="username"></span>!
        </h1>
        <script>
            document.getElementById("username").innerHTML = `{{username}}`;
        </script>
    </div>

    <div class="dashboard-container">

        <div class="card">
            <h2>📁 Upload File</h2>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <input type="file" name="file">
                </div>
                <button type="submit" class="magic-button upload-button">Upload to Cloud</button>
            </form>
        </div>

        <div class="card">
            <h2>🔍 Search</h2>
            <form action="/search" method="GET">
                <div class="form-group">
                    <input type="text" name="q" placeholder="Search for magical content...">
                </div>
                <button type="submit" class="magic-button search-button">Search</button>
            </form>
        </div>
    </div>

    <div class="actions">
        {% if session.is_admin %}
        <a href="/admin" class="admin-link">🛡️ Admin Panel</a>
        {% endif %}
        <a href="/logout" class="logout-link">Logout</a>
    </div>
</body>

</html>
