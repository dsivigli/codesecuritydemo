<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn Rentals - Magical Experiences Await</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            position: relative;
        }

        .unicorn-left, .unicorn-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        .unicorn-left {
            left: -50px;
            animation: float-left 4s ease-in-out infinite;
        }

        .unicorn-right {
            right: -50px;
            transform: translateY(-50%) scaleX(-1);
            animation: float-right 4s ease-in-out infinite 2s;
        }

        .unicorn-image {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            opacity: 0.9;
        }

        @keyframes float-left {
            0%, 100% { transform: translateY(-50%) translateX(0px); }
            50% { transform: translateY(-60%) translateX(10px); }
        }

        @keyframes float-right {
            0%, 100% { transform: translateY(-50%) scaleX(-1) translateX(0px); }
            50% { transform: translateY(-60%) scaleX(-1) translateX(-10px); }
        }

        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 4rem 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 2;
            position: relative;
            min-width: 400px;
        }

        .title {
            font-size: 3.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .event-title {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(45deg, #ff9500, #ffb84d, #ffd700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 2s ease infinite;
            margin-bottom: 1rem;
            text-align: center;
            text-shadow: 0 2px 10px rgba(255, 149, 0, 0.3);
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 3rem;
            text-align: center;
        }

        .button-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .magic-button {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-width: 150px;
            text-align: center;
            border: 2px solid transparent;
        }

        .login-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.6);
        }

        .register-btn {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.4);
        }

        .register-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(78, 205, 196, 0.6);
        }

        .magic-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .magic-button:hover::before {
            left: 100%;
        }

        .sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 3s infinite;
        }

        @keyframes sparkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 1200px) {
            .unicorn-left, .unicorn-right {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }

            .event-title {
                font-size: 1.5rem;
            }

            .button-container {
                flex-direction: column;
                align-items: center;
            }

            .magic-button {
                width: 200px;
            }

            .main-content {
                min-width: 300px;
                padding: 3rem 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="sparkles">
        <div class="sparkle" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
        <div class="sparkle" style="top: 80%; left: 20%; animation-delay: 1s;"></div>
        <div class="sparkle" style="top: 40%; left: 80%; animation-delay: 2s;"></div>
        <div class="sparkle" style="top: 60%; left: 70%; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="top: 30%; left: 50%; animation-delay: 1.5s;"></div>
        <div class="sparkle" style="top: 70%; left: 90%; animation-delay: 2.5s;"></div>
    </div>

    <div class="main-container">
        <div class="unicorn-left">
            <img src="/static/images/unicorn.png" alt="Unicorn" class="unicorn-image">
        </div>

        <div class="main-content">
            <h1 class="title">Unicorn Rentals</h1>
            <h2 class="event-title">re:invent 2025</h2>
            <p class="subtitle">Where magical dreams come to life ✨</p>

            <div class="button-container">
                <a href="/login" class="magic-button login-btn">Login</a>
                <a href="/register" class="magic-button register-btn">Register</a>
            </div>
        </div>

        <div class="unicorn-right">
            <img src="/static/images/unicorn.png" alt="Unicorn" class="unicorn-image">
        </div>
    </div>
</body>

</html>
